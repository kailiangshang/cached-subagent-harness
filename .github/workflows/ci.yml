name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Validate release metadata
        run: python3 scripts/validate-release.py .

      - name: Verify package
        run: scripts/verify.sh

  windows-install:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify native PowerShell installer
        shell: pwsh
        run: pwsh -NoProfile -File scripts/test_install.ps1
