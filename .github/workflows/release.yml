name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Verify package
        run: scripts/verify.sh

      - name: Validate package version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            python3 scripts/validate-release.py . --tag "$GITHUB_REF_NAME"
          else
            python3 scripts/validate-release.py .
          fi

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: harnessctl
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: harnessctl
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: harnessctl
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            binary: harnessctl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: harnessctl.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}

      - name: Test native runtime
        run: >-
          cargo test --locked
          --manifest-path skills/cached-subagent-harness/scripts/harnessctl/Cargo.toml
          --target ${{ matrix.target }}

      - name: Test native Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -File scripts/test_install.ps1

      - name: Build native runtime
        run: >-
          cargo build --release --locked
          --manifest-path skills/cached-subagent-harness/scripts/harnessctl/Cargo.toml
          --target ${{ matrix.target }}

      - name: Read package version
        id: package
        shell: bash
        run: |
          version="$(python -c 'import json; print(json.load(open(".codex-plugin/plugin.json", encoding="utf-8"))["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package native runtime
        shell: bash
        run: >-
          python scripts/package-release.py archive
          --binary "skills/cached-subagent-harness/scripts/harnessctl/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          --license LICENSE
          --version "${{ steps.package.outputs.version }}"
          --target "${{ matrix.target }}"
          --output-dir dist

      - name: Upload native archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: harnessctl-${{ matrix.target }}
          path: dist/harnessctl-v${{ steps.package.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - verify
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download native archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: harnessctl-*
          path: dist
          merge-multiple: true

      - name: Generate and validate checksums
        run: >-
          python3 scripts/package-release.py checksums
          --input-dir dist
          --output dist/SHA256SUMS

      - name: Publish versioned GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/harnessctl-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            "dist/harnessctl-${GITHUB_REF_NAME}-aarch64-unknown-linux-gnu.tar.gz" \
            "dist/harnessctl-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz" \
            "dist/harnessctl-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" \
            "dist/harnessctl-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip" \
            "dist/SHA256SUMS" \
            --verify-tag \
            --notes-file docs/releases/0.2.0.md \
            --title "$GITHUB_REF_NAME"
